name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  SERVICE_NAME: blog
  RUN_REGION: europe-west1
  EDGE_IMAGE_REPO: docker.io/huangjien/website-edge

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Quality Gates

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack and activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.27.0 --activate

      - name: Install dependencies (pnpm)
        run: pnpm install --color=true

      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm type-check
      - run: pnpm check:i18n-parity
      - run: pnpm test:ci
      - run: pnpm check:pages-tests
      - run: pnpm build:webpack
      - run: pnpm perf:ci
      - run: pnpm lhci:collect
        continue-on-error: true
      - run: pnpm lhci:assert
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    name: Build and Deploy Edge Runtime
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate

    permissions:
      contents: "read"
      id-token: "write"
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      HOME_UPSTREAM_HOST: ${{ secrets.HOME_UPSTREAM_HOST || vars.HOME_UPSTREAM_HOST }}
      HOME_UPSTREAM_PORT: ${{ secrets.HOME_UPSTREAM_PORT || vars.HOME_UPSTREAM_PORT }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required deployment secrets and config
        run: |
          REQUIRED_VARS="PROJECT_ID HOME_UPSTREAM_HOST HOME_UPSTREAM_PORT DOCKER_PASSWORD"
          for var in $REQUIRED_VARS; do
            value="${!var:-}"
            if [ -z "$value" ]; then
              echo "Missing required deployment value: $var" >&2
              exit 1
            fi
          done
          if ! [[ "$HOME_UPSTREAM_PORT" =~ ^[0-9]+$ ]]; then
            echo "HOME_UPSTREAM_PORT must be numeric" >&2
            exit 1
          fi

      - id: "auth"
        uses: "google-github-actions/auth@v1"
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v3"

      - name: Info
        run: gcloud info

      - name: Login to docker.io
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ github.repository_owner }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push edge Docker image
        run: |
          IMAGE_TAG="${EDGE_IMAGE_REPO}:$(echo ${{ github.sha }} | cut -c1-8)"
          docker buildx build --platform linux/amd64 --push -f Dockerfile.edge -t "$IMAGE_TAG" -t "${EDGE_IMAGE_REPO}:latest" .
          echo "EDGE_IMAGE=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Render Cloud Run service manifest
        run: |
          sed \
            -e "s|__SERVICE_NAME__|${SERVICE_NAME}|g" \
            -e "s|__EDGE_IMAGE__|${EDGE_IMAGE}|g" \
            -e "s|__HOME_UPSTREAM_HOST__|${HOME_UPSTREAM_HOST}|g" \
            -e "s|__HOME_UPSTREAM_PORT__|${HOME_UPSTREAM_PORT}|g" \
            -e "s|__RELAY_LISTEN_PORT__|18080|g" \
            -e "s|__TS_ADVERTISE_TAGS__|tag:cloud-run-edge|g" \
            -e "s|__TS_AUTHKEY_SECRET__|TS_AUTHKEY|g" \
            deploy/cloudrun/service.yaml > /tmp/cloudrun-service.yaml

      - name: Validate rendered service manifest
        run: |
          if grep -qE "__[A-Z0-9_]+__" /tmp/cloudrun-service.yaml; then
            echo "Rendered manifest still contains unresolved placeholders" >&2
            exit 1
          fi
          grep -q 'name: blog' /tmp/cloudrun-service.yaml || {
            echo "Service name missing from rendered manifest" >&2
            exit 1
          }

      - name: Deploy
        id: deploy
        run: |
          gcloud run services replace /tmp/cloudrun-service.yaml \
            --region "$RUN_REGION" \
            --project "$PROJECT_ID" \
            --platform managed
          gcloud run services add-iam-policy-binding "$SERVICE_NAME" \
            --region "$RUN_REGION" \
            --project "$PROJECT_ID" \
            --member="allUsers" \
            --role="roles/run.invoker"

      - name: Smoke check
        run: |
          SERVICE_URL="$(gcloud run services describe "$SERVICE_NAME" --region "$RUN_REGION" --project "$PROJECT_ID" --format='value(status.url)')"
          curl -fsS "${SERVICE_URL}/healthz"

      - name: Show Output
        run: gcloud run services describe "$SERVICE_NAME" --region "$RUN_REGION" --project "$PROJECT_ID" --format='value(status.url)'
