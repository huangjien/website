name: Bot Silence Detector

# Opens an Issue (NOT a PR — see below) if neither Renovate nor Dependabot has
# opened or updated a PR in the last 7 days. Catches the "bot silently died"
# failure mode that repositoryIssues alone won't surface.
#
# Why an Issue and not an auto-PR?
#   "The bot is silent" isn't a code change. Opening a PR would be empty
#   content with a misleading diff. An Issue is the right primitive — it
#   gets a label, an assignee, and an auto-close when activity resumes.

on:
  schedule:
    # Mondays 12:00 UTC = 6h after Renovate's 06:00 UTC run.
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  detect-silence:
    name: Check 7-day bot activity
    runs-on: ubuntu-latest
    steps:
      - name: Check for bot PR activity in last 7 days
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          SINCE=$(date -u -v-7d +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u --date='7 days ago' +%Y-%m-%dT%H:%M:%SZ)
          echo "Looking for bot PR activity since ${SINCE}"

          # Search for PRs opened by renovate or dependabot in the last week.
          # We use the REST search API directly so we don't depend on gh CLI
          # version pinning.
          ACTIVITY=$(curl -fsS \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/search/issues?q=repo:${REPO}+is:pr+author:app/renovate+OR+author:app/dependabot+updated:%3E${SINCE}&sort=updated&order=desc&per_page=1" \
            | jq '.total_count // 0')

          echo "Bot PRs in last 7 days: ${ACTIVITY}"
          echo "silent=$([ "$ACTIVITY" = "0" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Skip if bots were active
        if: steps.check.outputs.silent != 'true'
        run: echo "Bots were active in the last 7 days — no action needed."

      - name: Check for existing silence issue
        if: steps.check.outputs.silent == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          EXISTING=$(curl -fsS \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/search/issues?q=repo:${REPO}+is:issue+is:open+label:bot-silence" \
            | jq '.total_count // 0')
          echo "Existing open bot-silence issues: ${EXISTING}"
          echo "exists=$([ "$EXISTING" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Open bot-silence issue
        if: steps.check.outputs.silent == 'true' && steps.existing.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          BODY=$(cat <<'EOF'
          ## Dependency bots have been silent for 7+ days

          Neither Renovate nor Dependabot has opened or updated a PR in the last 7 days.

          ### Possible causes

          - Renovate app is uninstalled or paused
          - GitHub Actions secret `RENOVATE_WEBHOOK_URL` is misconfigured (if webhook integration is enabled)
          - Renovate/Dependabot is rate-limited
          - The schedule in `.github/renovate.json` or `.github/dependabot.yml` is wrong
          - Repository access for the bot was revoked

          ### Triage

          1. Check the [Renovate dashboard](https://app.renovatebot.com/dashboard) for the repo's last run.
          2. Open a recent workflow run of `.github/workflows/CID.yaml` and look for any bot failures.
          3. Re-enable / re-install Renovate if needed: <https://github.com/apps/renovate>
          4. If Dependabot is also silent, check <https://github.com/dependabot>.

          This issue will auto-close once a bot opens or updates a PR.
          EOF
          )

          curl -fsS -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/issues" \
            -d "$(jq -n \
              --arg title 'Dependency bots have been silent for 7+ days' \
              --arg body "$BODY" \
              '{title: $title, body: $body, labels: ["bot-failure", "bot-silence", "dependencies"], assignees: ["huangjien"]}')"

      - name: Close stale bot-silence issues when activity resumes
        if: steps.check.outputs.silent != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          # Find any open bot-silence issues and close them.
          ISSUES=$(curl -fsS \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/search/issues?q=repo:${REPO}+is:issue+is:open+label:bot-silence" \
            | jq -r '.items[].number // empty')

          for n in $ISSUES; do
            echo "Closing issue #${n} — bot activity detected in last 7 days."
            curl -fsS -X PATCH \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/issues/${n}" \
              -d '{"state": "closed", "state_reason": "completed"}'
          done